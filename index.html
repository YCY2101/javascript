<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="🎣 釣魚遊戲 - 快速打字遊戲">
  <title>🎣 Fishing Typing Game - 釣魚遊戲</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎮 開始畫面 -->
  <div id="startScreen">
    <div id="startMoneyBox">💵 餘額: <span id="startMoney">0</span></div>
    <div id="startHighScoreBox">🏅 最高分: <span id="startHighScore">0</span></div>

    <div id="startTopButtons">
      <button id="startShopBtn" class="start-action-btn" onclick="openShop()">🛍️ 商店</button>
      <button id="startInventoryBtn" class="start-action-btn" onclick="openInventory()">🎒 背包</button>
      <button id="startLeaderboardBtn" class="start-action-btn" onclick="openLeaderboard()">🏆 排行榜</button>
    </div>

    <h1>🎣 Fishing Typing Game</h1>
    <p style="font-size: 18px; margin: 0;">快速打字，釣出更多魚吧！</p>

    <div id="difficultySelection">
      <button class="difficulty-btn" onclick="startGame('easy')">簡單</button>
      <button class="difficulty-btn" onclick="startGame('normal')">中等</button>
      <button class="difficulty-btn" onclick="startGame('hard')">困難</button>
      <button class="difficulty-btn" onclick="startGame('infinite')">無限</button>
    </div>
  </div>

  <!-- 🎮 遊戲區域 -->
  <div id="game" style="display: none;">
    <div id="sea"></div>
    <div id="land">
      <div id="boat"></div>
      <!-- 🎣 魚夫 -->
      <div id="fisherman"></div>
      <div id="rod"></div>
    </div>

    <!-- 📊 遊戲信息 -->
    <div id="info">
      <span>Score: <span id="score">0</span> |</span>
      <span><span id="timeLabel">Time</span>: <span id="time">60</span><span id="timeSuffix">s</span> |</span>
      <span>Combo: <span id="combo">0</span></span>
      <button id="pauseBtn" class="small-btn" onclick="pauseGame()">⏸ 暫停</button>
    </div>

    <!-- ⌨️ 輸入顯示 -->
    <div id="input"></div>
  </div>

  <!-- ⏸ 暫停視窗 -->
  <div id="pauseModal" class="modal-screen" style="display: none;">
    <div class="modal-card small-card">
      <div class="modal-header">
        <div>
          <h2>⏸ 遊戲暫停</h2>
          <p class="muted-text">遊戲已暫停，按「繼續」恢復或「結束」回到開始畫面。</p>
        </div>
      </div>
      <div class="modal-actions bottom-actions">
        <button class="primary-btn" onclick="resumeGame()">繼續</button>
        <button class="secondary-btn" onclick="endGame()">結束</button>
      </div>
    </div>
  </div>

  <!-- 🧾 遊戲結束視窗 -->
  <div id="gameOverModal" class="modal-screen" style="display: none;">
    <div class="modal-card small-card">
      <h2>⏰ 遊戲結束</h2>
      <p>💯 最終分數：<span id="finalScore">0</span></p>
      <p>💵 目前餘額：<span id="finalMoney">0</span></p>
      <p>📘 本局單字數：<span id="finalWordCount">0</span></p>

      <div class="score-submit-box">
        <label for="playerNameInput">玩家名稱</label>
        <div class="score-submit-row">
          <input id="playerNameInput" type="text" maxlength="20" placeholder="輸入名字登上排行榜">
          <button id="submitScoreBtn" class="primary-btn" onclick="submitScore()">登記分數</button>
          <button id="skipScoreBtn" class="secondary-btn" onclick="skipScoreRegistration()">跳過</button>
        </div>
        <p id="leaderboardStatus" class="muted-text"></p>
      </div>

      <div class="modal-actions">
        <button class="primary-btn" onclick="openLeaderboard()">查看排行榜</button>
        <button class="secondary-btn" onclick="skipScoreRegistration()">跳過並回到首頁</button>
      </div>
    </div>
  </div>

  <!-- 🏆 排行榜視窗 -->
  <div id="leaderboardModal" class="modal-screen" style="display: none;">
    <div class="modal-card leaderboard-card">
      <div class="modal-header">
        <div>
          <h2>🏆 線上排行榜</h2>
          <p class="muted-text">登記分數後，可以跟其他玩家比較排名。</p>
        </div>
        <button class="close-btn" onclick="closeLeaderboard()">✕</button>
      </div>

      <div id="leaderboardTabs" class="inventory-tabs"></div>
      <div id="leaderboardNotice" class="leaderboard-notice"></div>
      <div id="leaderboardLoading" class="empty-state" style="display: none;">排行榜讀取中...</div>
      <div id="leaderboardEmpty" class="empty-state" style="display: none;">目前還沒有分數，先搶第一名。</div>

      <div class="table-scroll">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>名次</th>
              <th>玩家</th>
              <th>分數</th>
              <th>難度</th>
              <th>時間</th>
            </tr>
          </thead>
          <tbody id="leaderboardTableBody"></tbody>
        </table>
      </div>
      <div id="leaderboardPagination" class="pagination"></div>

      <div class="modal-actions bottom-actions">
        <button class="secondary-btn" onclick="loadLeaderboard()">重新整理</button>
        <button class="secondary-btn" onclick="closeLeaderboard()">關閉</button>
      </div>
    </div>
  </div>


  <!-- 🛍️ 商店螢幕 -->
  <div id="shopModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; overflow-y: auto;">
    <div style="max-width: 900px; margin: 20px auto; background: white; border-radius: 10px; padding: 30px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">🛍️ 商店</h2>
        <div style="display: flex; align-items: center; gap: 16px;">
          <div style="font-size: 16px; color: #555;">最高分: <span id="shopHighScore">0</span></div>
          <div style="font-size: 20px; font-weight: bold;">餘額: <span id="shopMoney">0</span></div>
        </div>
        <button onclick="closeShop()" style="padding: 10px 20px; font-size: 16px; background: #ccc; border: none; border-radius: 5px; cursor: pointer;">關閉</button>
      </div>
      <div id="shopTabs" class="inventory-tabs"></div>
      <div id="shopItems" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;"></div>
    </div>
  </div>

  <!-- 🎒 背包視窗 -->
  <div id="inventoryModal" class="modal-screen" style="display: none;">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2>🎒 背包</h2>
          <p class="muted-text">查看目前擁有的釣竿與人物。上方可切換分類，內部卡片樣式與商店一致。</p>
        </div>
        <button class="close-btn" onclick="closeInventory()">✕</button>
      </div>
      <div id="inventoryContent">
        <div id="inventoryTabs" class="inventory-tabs"></div>
        <div id="inventoryItems" class="inventory-items-grid"></div>
      </div>
      <div class="modal-actions bottom-actions">
        <button class="secondary-btn" onclick="closeInventory()">關閉</button>
      </div>
    </div>
  </div>

  <!-- 🔊 音效 -->
  <audio id="hitSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <!-- 📜 腳本 -->
  <script src="script.js"></script>
  <script src="leaderboard.js"></script>
</body>
</html>
